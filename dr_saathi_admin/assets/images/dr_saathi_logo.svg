<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sphere gradient: dark blue bottom to medium blue top -->
    <linearGradient id="sphereGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#29B6F6"/>
      <stop offset="40%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>

    <!-- Left wing gradient -->
    <linearGradient id="leftWingGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0288D1"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>

    <!-- Right flowing gradient -->
    <linearGradient id="rightFlowGrad" x1="0.5" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="50%" stop-color="#039BE5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>

    <!-- Head circle gradient -->
    <radialGradient id="headGrad" cx="0.4" cy="0.35">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="50%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#29B6F6"/>
    </linearGradient>

    <!-- Highlight gradient for inner curves -->
    <linearGradient id="highlightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0D47A1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background (transparent) -->
  <rect width="600" height="800" fill="none"/>

  <!-- ==================== SPHERE/BODY ==================== -->
  <g transform="translate(300, 280)" filter="url(#shadow)">

    <!-- Main sphere body - egg/oval shape -->
    <path d="
      M 0,-180
      C 100,-180 170,-120 180,-20
      C 190,80 160,170 80,200
      C 40,215 0,220 -20,218
      C -80,210 -150,160 -175,60
      C -195,-30 -160,-140 -80,-175
      C -40,-190 -10,-185 0,-180
      Z
    " fill="url(#sphereGrad)"/>

    <!-- Left wing/leaf shape - darker blue -->
    <path d="
      M -30,-140
      C -90,-120 -150,-50 -160,30
      C -165,80 -140,140 -90,175
      C -60,195 -20,200 10,185
      C -40,160 -80,120 -100,70
      C -120,10 -100,-60 -60,-110
      C -45,-130 -35,-138 -30,-140
      Z
    " fill="url(#leftWingGrad)" opacity="0.9"/>

    <!-- White flowing S-curve ribbon (upper) -->
    <path d="
      M -20,-130
      C 30,-100 60,-50 40,0
      C 20,50 -40,70 -60,40
    " fill="none" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.85"/>

    <!-- White flowing S-curve ribbon (lower) -->
    <path d="
      M -60,40
      C -80,10 -20,-10 30,30
      C 80,70 100,130 60,185
    " fill="none" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.7"/>

    <!-- Right side flowing shape -->
    <path d="
      M 40,-140
      C 100,-100 150,-30 155,40
      C 160,110 130,170 80,200
      C 100,150 110,90 90,30
      C 70,-30 50,-90 40,-140
      Z
    " fill="url(#rightFlowGrad)" opacity="0.7"/>

    <!-- Inner highlight curves for depth -->
    <path d="
      M 10,-100
      C 60,-70 90,-10 80,50
      C 70,110 30,160 -10,180
    " fill="none" stroke="#4FC3F7" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

    <!-- Additional flowing accent -->
    <path d="
      M -80,80
      C -40,100 0,140 30,190
    " fill="none" stroke="#29B6F6" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

  </g>


  <!-- ==================== TEXT ==================== -->
  <!-- "Dr.Saathi" -->
  <text x="300" y="580" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="700" fill="url(#textGrad)"
        letter-spacing="1">Dr.Saathi</text>

  <!-- "Your Health Companion" -->
  <text x="300" y="625" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="400" fill="#78909C"
        letter-spacing="2">Your Health Companion</text>

</svg>
